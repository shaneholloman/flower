syntax = "proto3";

package flwr.proto;

import "flwr/proto/message.proto";
import "flwr/proto/fab.proto";
import "flwr/proto/federation_config.proto";
import "flwr/proto/run.proto";
import "flwr/proto/task.proto";

// These messages are used by both ServerAppIo and ClientAppIo services

// PullPendingTasks messages
message PullPendingTasksRequest {}
message PullPendingTasksResponse { repeated Task tasks = 1; }

// ClaimTask messages
message ClaimTaskRequest { uint64 task_id = 1; }
message ClaimTaskResponse { optional string token = 1; }

// SendTaskHeartbeat messages
message SendTaskHeartbeatRequest {}
message SendTaskHeartbeatResponse { bool success = 1; }

// PushAppMessages messages
message PushAppMessagesRequest {
  repeated Message messages_list = 2;
  repeated ObjectTree message_object_trees = 3;
}
message PushAppMessagesResponse {
  repeated string message_ids = 1;
  repeated string objects_to_push = 2;
}

// PullAppMessages messages
message PullAppMessagesRequest { repeated string message_ids = 2; }
message PullAppMessagesResponse {
  repeated Message messages_list = 1;
  repeated ObjectTree message_object_trees = 2;
}

// PushTaskMessage messages
message PushTaskMessageRequest { Message message = 1; }
message PushTaskMessageResponse { string message_id = 1; }

// PullTaskMessage messages
message PullTaskMessageRequest { optional uint64 limit = 1; }
message PullTaskMessageResponse { repeated Message messages = 1; }

// PullTaskInput messages
message PullTaskInputRequest {}
message PullTaskInputResponse {
  Context context = 1;
  Run run = 2;
  Fab fab = 3;
  SimulationConfig federation_config = 4;
  uint64 task_id = 5;
}

// PushTaskOutput messages
message PushTaskOutputRequest {
  Context context = 1;
  string sub_status = 2;
  string details = 3;
}
message PushTaskOutputResponse {}

// CreateTask messages
message CreateTaskRequest {
  string type = 1;
  optional string fab_hash = 2;
  optional string model_ref = 3;
  optional string connector_ref = 4;
}
message CreateTaskResponse { optional uint64 task_id = 1; }
