name: Reusable Docker image build workflow

on:
  workflow_call:
    inputs:
      image-repository:
        description: "Fully qualified image repository, including registry host and path (for example, docker.io/flwr/base)."
        required: true
        type: string
      registry:
        description: "Docker registry host supplied by the caller."
        required: false
        type: string
        default: ""
      file-dir:
        description: "Path of the directory that contains the Dockerfile."
        required: true
        type: string
      dockerfile:
        description: "Dockerfile path relative to the repository root."
        required: false
        type: string
        default: ""
      context:
        description: "Docker build context."
        required: false
        type: string
        default: ""
      build-args:
        description: "List of build-time variables."
        required: false
        type: string
      tags:
        description: "List of tags."
        required: true
        type: string
      prepare-framework:
        description: "Run repository-specific framework preparation before building."
        required: false
        type: boolean
        default: false
      patch-base-dockerfiles:
        description: "Run repository-specific base Dockerfile patching before building."
        required: false
        type: boolean
        default: false
      build-local-wheel:
        description: "Build the local framework wheel and let scripts substitute it into build args."
        required: false
        type: boolean
        default: false
      flower-repo-ref:
        description: "Flower repository ref used by repository-specific preparation."
        required: false
        type: string
        default: main
      docker-registry-user:
        description: "Docker registry username."
        required: false
        default: ""
        type: string
    secrets:
      docker-registry-token:
        required: false
    outputs:
      metadata:
        description: "Metadata of the Docker image."
        value: ${{ jobs.build-manifest.outputs.metadata }}

permissions:
  contents: read

# based on https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
jobs:
  build:
    name: Build Docker image
    runs-on: ${{ matrix.platform.runner-os }}
    timeout-minutes: 180
    outputs:
      build-id: ${{ steps.build-id.outputs.id }}
    strategy:
      fail-fast: true
      matrix:
        platform:
          [
            { name: "amd64", docker: "linux/amd64", runner-os: "ubuntu-22.04" },
            {
              name: "arm64",
              docker: "linux/arm64",
              runner-os: "ubuntu-4-core-arm64",
            },
          ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bootstrap
        if: ${{ inputs.prepare-framework || inputs.build-local-wheel }}
        uses: ./.github/actions/bootstrap

      - name: Install system dependencies
        if: ${{ inputs.prepare-framework || inputs.patch-base-dockerfiles || inputs.build-local-wheel }}
        run: |
          sudo apt-get update
          sudo apt-get install -y patch rsync

      - name: Prepare Docker build context
        if: ${{ inputs.prepare-framework || inputs.patch-base-dockerfiles || inputs.build-local-wheel }}
        env:
          FLOWER_REPO_REF: ${{ inputs.flower-repo-ref }}
          PREPARE_FRAMEWORK: ${{ inputs.prepare-framework }}
          PATCH_BASE_DOCKERFILES: ${{ inputs.patch-base-dockerfiles }}
          BUILD_LOCAL_WHEEL: ${{ inputs.build-local-wheel }}
        run: ./framework/dev/release/prepare-docker-build-context.sh

      - name: Resolve build args
        id: resolved-build-args
        env:
          INPUT_BUILD_ARGS: ${{ inputs.build-args }}
          BUILD_LOCAL_WHEEL: ${{ inputs.build-local-wheel }}
        run: ./framework/dev/release/resolve-docker-build-args.sh

      - name: Create build id
        id: build-id
        shell: python
        run: |
          import hashlib
          import os

          hash = hashlib.sha256('''${{ inputs.image-repository }}
          ${{ inputs.file-dir }}
          ${{ steps.resolved-build-args.outputs.build-args }}'''.encode())

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              print(f"id={hash.hexdigest()}", file=fh)

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: ${{ inputs.image-repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Validate Docker registry credentials
        env:
          DOCKER_REGISTRY_USER: ${{ inputs.docker-registry-user }}
          DOCKER_REGISTRY_TOKEN: ${{ secrets.docker-registry-token }}
        run: |
          if [[ -z "${DOCKER_REGISTRY_USER}" ]]; then
            echo "::error::docker-registry-user input is required for Docker login."
            exit 1
          fi

          if [[ -z "${DOCKER_REGISTRY_TOKEN}" ]]; then
            echo "::error::docker-registry-token secret is required and was not provided."
            exit 1
          fi

      - name: Login to Docker registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.docker-registry-user }}
          password: ${{ secrets.docker-registry-token }}

      - name: Build and push
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        id: build
        with:
          action: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
          attempt_limit: 60 # 60 attempts * (9 secs delay + 1 sec retry) = ~10 mins
          attempt_delay: 9000 # 9 secs
          with: |
            pull: true
            sbom: true
            platforms: ${{ matrix.platform.docker }}
            context: ${{ inputs.context != '' && inputs.context || format('{{defaultContext}}:{0}', inputs.file-dir) }}
            file: ${{ inputs.dockerfile != '' && inputs.dockerfile || (inputs.context != '' && format('{0}/Dockerfile', inputs.file-dir) || 'Dockerfile') }}
            outputs: type=image,name=${{ inputs.image-repository }},push-by-digest=true,name-canonical=true,push=true
            build-args: |
              ${{ steps.resolved-build-args.outputs.build-args }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ fromJSON(steps.build.outputs.outputs).digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digests-${{ steps.build-id.outputs.id }}-${{ matrix.platform.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-manifest:
    name: Build and push Docker manifest for all platforms
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: build
    outputs:
      metadata: ${{ steps.meta.outputs.json }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: digests-${{ needs.build.outputs.build-id }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: ${{ inputs.image-repository }}
          tags: ${{ inputs.tags }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Validate Docker registry credentials
        env:
          DOCKER_REGISTRY_USER: ${{ inputs.docker-registry-user }}
          DOCKER_REGISTRY_TOKEN: ${{ secrets.docker-registry-token }}
        run: |
          if [[ -z "${DOCKER_REGISTRY_USER}" ]]; then
            echo "::error::docker-registry-user input is required for Docker login."
            exit 1
          fi

          if [[ -z "${DOCKER_REGISTRY_TOKEN}" ]]; then
            echo "::error::docker-registry-token secret is required and was not provided."
            exit 1
          fi

      - name: Login to Docker registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.docker-registry-user }}
          password: ${{ secrets.docker-registry-token }}

      - name: Create Docker manifest list and push
        working-directory: /tmp/digests
        run: |
          tag_args=()
          while IFS= read -r tag; do
            tag_args+=("-t" "${tag}")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          digest_args=()
          for digest in *; do
            digest_args+=("${{ inputs.image-repository }}@sha256:${digest}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"

      - name: Inspect Docker image
        run: docker buildx imagetools inspect ${{ inputs.image-repository }}:${{ steps.meta.outputs.version }}
